<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turni Capitel - Accesso Protetto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee; --surface: #ffffff; --surface2: #f0ede6; --border: #e2ddd5;
  --border2: #cec9bf; --text: #1a1814; --text2: #6b6560; --text3: #9e9890;
  --accent: #2d4a3e; --accent2: #3d6b5a; --accent-light: #e8f0ec;
  --danger: #8b3a2a; --danger-light: #f5e8e5; --warn: #7a5c1e;
  --warn-light: #faf0dc; --ok: #2d5a3a; --ok-light: #e8f5ec;
  --blue: #1e3f6b; --blue-light: #e5edf7; --radius: 10px;
  --radius-sm: 6px; --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }

#login-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
}
.login-card {
    background: var(--surface); padding: 2rem; border-radius: var(--radius);
    box-shadow: var(--shadow-md); border: 1px solid var(--border);
    max-width: 400px; width: 100%; text-align: center;
}
.login-card h2 { margin-bottom: 1.5rem; color: var(--accent); }

.header { background: var(--accent); color: white; padding: 0 1.5rem; display: flex; align-items: center; height: 56px; gap: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-md); }
.header-logo { font-size: 18px; font-weight: 600; flex: 1; }
.main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

.tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; gap: 2px; margin-bottom: 1.5rem; }
.tab { flex: 1; padding: 8px 12px; font-size: 13px; font-weight: 500; border: none; background: transparent; color: var(--text2); border-radius: calc(var(--radius) - 2px); cursor: pointer; }
.tab.active { background: var(--accent); color: white; }
.section { display: none; }
.section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.card-title { font-weight: 600; margin-bottom: 1rem; color: var(--accent); }
.form-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.form-label { font-size: 13px; color: var(--text2); min-width: 100px; }
input, select { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none; }
.btn { padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--border2); font-weight: 500; font-size: 13px; transition: all 0.2s; }
.btn.primary { background: var(--accent); color: white; border: none; }
.btn.primary:hover { background: var(--accent2); }

.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; font-weight: 600; }
.badge-comande { background: var(--ok-light); color: var(--ok); }
.badge-bar { background: var(--blue-light); color: var(--blue); }
.badge-sala { background: var(--surface2); color: var(--text2); }
.emp-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid var(--border); }
.pill { display: inline-block; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2); cursor: pointer; font-size: 12px; margin: 4px; background: var(--surface); transition: 0.2s; }
.pill.on { background: var(--accent); color: white; border-color: var(--accent); }

.cal-day { display: grid; grid-template-columns: 80px 1fr; gap: 8px; margin-bottom: 10px; }
.turn-box { border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 6px; }
.chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); margin: 2px; display: inline-block; cursor: pointer; background: var(--surface2); }
.chip.assigned { background: var(--ok-light); color: var(--ok); border-color: var(--ok); }
.chip.unavail { opacity: 0.3; pointer-events: none; }
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>Accesso Capitel</h2>
        <div class="form-row">
            <input type="text" id="login-letter" placeholder="Lettera iniziale" maxlength="1" style="text-transform: uppercase; text-align: center; font-size: 20px;">
        </div>
        <div class="form-row">
            <input type="password" id="login-code" placeholder="Codice Segreto" style="text-align: center;">
        </div>
        <button class="btn primary" style="width: 100%; margin-top: 10px;" onclick="handleLogin()">Entra</button>
        <p id="login-error" style="color: var(--danger); font-size: 12px; margin-top: 10px; display: none;">Credenziali errate</p>
    </div>
</div>

<div id="app-content" style="display:none;">
    <header class="header">
      <div class="header-logo">Capitel - Gestione Turni</div>
      <div id="user-display" style="font-size: 12px; opacity: 0.8;"></div>
      <button class="btn sm" onclick="handleLogout()" style="background: rgba(255,255,255,0.1); color: white; border: none;">Esci</button>
    </header>

    <div class="main">
      <div class="tabs" id="main-tabs">
        <button class="tab" id="t-dipendenti" onclick="showTab('dipendenti',this)">Dipendenti</button>
        <button class="tab" id="t-disponibilita" onclick="showTab('disponibilita',this)">Disponibilità</button>
        <button class="tab" id="t-calendario" onclick="showTab('calendario',this)">Calendario</button>
        <button class="tab" id="t-riepilogo" onclick="showTab('riepilogo',this)">Riepilogo</button>
      </div>

      <div class="section" id="tab-dipendenti">
        <div class="card">
          <div class="card-title">Nuovo Dipendente</div>
          <div class="form-row">
            <input type="text" id="new-name" placeholder="Nome completo" />
            <select id="new-role">
                <option value="sala">Sala</option>
                <option value="comande">Comande</option>
                <option value="bar">Bar</option>
            </select>
          </div>
          <div class="form-row">
            <input type="text" id="new-code" placeholder="Codice Accesso" />
            <button class="btn primary" onclick="addEmployee()">Aggiungi</button>
          </div>
        </div>
        <div id="emp-list"></div>
      </div>

      <div class="section" id="tab-disponibilita">
        <div class="card">
          <div class="form-row" id="admin-emp-selector">
            <span class="form-label">Seleziona Dipendente:</span>
            <select id="disp-emp" onchange="renderDisp()"></select>
          </div>
          <h3 id="disp-user-title" style="margin-bottom: 10px;">Le tue disponibilità</h3>
          <p style="font-size: 12px; color: var(--text3); margin-bottom: 15px;">Seleziona i turni in cui sei disponibile.</p>
        </div>
        <div class="card" id="disp-container"></div>
      </div>

      <div class="section" id="tab-calendario">
        <div style="display:flex; align-items: center; gap: 10px; margin-bottom: 15px;">
            <button class="btn" onclick="changeMonth(-1)">Precedente</button>
            <h3 id="cal-title" style="flex:1; text-align: center;"></h3>
            <button class="btn" onclick="changeMonth(1)">Successivo</button>
        </div>
        <div id="cal-container"></div>
      </div>

      <div class="section" id="tab-riepilogo">
          <div id="metrics" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;"></div>
          <div id="recap-list"></div>
      </div>
    </div>
</div>

<script>
const TURNI_REQS = {
  1:[{id:'cena',nome:'Cena',req:{tot:3,comande:1,bar:1}}],
  2:[{id:'cena',nome:'Cena',req:{tot:3,comande:1,bar:1}}],
  3:[{id:'cena',nome:'Cena',req:{tot:3,comande:1,bar:0}}],
  4:[{id:'cena',nome:'Cena',req:{tot:3,comande:1,bar:1}}],
  5:[{id:'cena',nome:'Cena',req:{tot:4,comande:1,bar:0}}],
  6:[{id:'pranzo',nome:'Pranzo',req:{tot:3,comande:1,bar:0}},{id:'cena',nome:'Cena',req:{tot:6,comande:2,bar:1}}],
  0:[{id:'pranzo',nome:'Pranzo',req:{tot:5,comande:2,bar:1}},{id:'cena',nome:'Cena',req:{tot:4,comande:1,bar:1}}]
};

const STORAGE_KEY = 'capitel_data_v2';
let currentUser = null;

let S = {
  admin: { letter: 'A', code: '1234' },
  employees: [],
  availability: {},
  assignments: {},
  month: new Date().getMonth(),
  year: new Date().getFullYear(),
  nextId: 1
};

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); }
function load() { 
    const data = localStorage.getItem(STORAGE_KEY);
    if(data) S = JSON.parse(data);
}

function handleLogin() {
    const letter = document.getElementById('login-letter').value.toUpperCase();
    const code = document.getElementById('login-code').value;

    if(letter === S.admin.letter && code === S.admin.code) {
        currentUser = { role: 'admin', name: 'Amministratore' };
        bootApp();
    } else {
        const emp = S.employees.find(e => e.letter === letter && e.code === code);
        if(emp) {
            currentUser = { role: 'employee', ...emp };
            bootApp();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }
}

function handleLogout() {
    currentUser = null;
    document.getElementById('app-content').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
}

function bootApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    document.getElementById('user-display').textContent = `Utente: ${currentUser.name}`;
    
    if(currentUser.role === 'admin') {
        document.querySelectorAll('.tab').forEach(t => t.style.display = 'block');
        document.getElementById('admin-emp-selector').style.display = 'flex';
        document.getElementById('disp-user-title').style.display = 'none';
        showTab('dipendenti', document.getElementById('t-dipendenti'));
    } else {
        document.getElementById('t-dipendenti').style.display = 'none';
        document.getElementById('t-calendario').style.display = 'none';
        document.getElementById('t-riepilogo').style.display = 'none';
        document.getElementById('admin-emp-selector').style.display = 'none';
        document.getElementById('disp-user-title').textContent = `Disponibilità di ${currentUser.name}`;
        showTab('disponibilita', document.getElementById('t-disponibilita'));
    }
    syncEmpSelect();
}

function showTab(name, btn) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    
    if(name === 'dipendenti') renderEmps();
    if(name === 'disponibilita') renderDisp();
    if(name === 'calendario') renderCal();
    if(name === 'riepilogo') renderRiepilogo();
}

function addEmployee() {
    const name = document.getElementById('new-name').value;
    const role = document.getElementById('new-role').value;
    const code = document.getElementById('new-code').value;
    if(!name || !code) return alert("Dati incompleti");
    
    S.employees.push({
        id: S.nextId++,
        name: name,
        role: role,
        letter: name.charAt(0).toUpperCase(),
        code: code
    });
    save(); renderEmps(); syncEmpSelect();
    document.getElementById('new-name').value = "";
    document.getElementById('new-code').value = "";
}

function renderEmps() {
    const list = document.getElementById('emp-list');
    list.innerHTML = S.employees.map(e => `
        <div class="emp-row">
            <div style="flex:1">
                <strong>${e.name}</strong> (Accesso: ${e.letter} + ${e.code})
            </div>
            <span class="badge badge-${e.role}">${e.role}</span>
            <button class="btn" onclick="deleteEmp(${e.id})" style="color:var(--danger)">Elimina</button>
        </div>
    `).join('');
}

function deleteEmp(id) {
    if(confirm("Eliminare dipendente?")) {
        S.employees = S.employees.filter(e => e.id !== id);
        save(); renderEmps();
    }
}

function syncEmpSelect() {
    const sel = document.getElementById('disp-emp');
    if(sel) sel.innerHTML = S.employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
}

function renderDisp() {
    const targetId = currentUser.role === 'admin' ? 
                     parseInt(document.getElementById('disp-emp').value) : 
                     currentUser.id;
    if(!targetId) return;
    
    const days = new Date(S.year, S.month + 1, 0).getDate();
    let html = "";
    for(let d=1; d<=days; d++) {
        const dow = new Date(S.year, S.month, d).getDay();
        const turni = TURNI_REQS[dow];
        if(!turni) continue;
        html += `<div style="padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center;">
                    <div style="width: 100px;">${d}/${S.month+1}</div>
                    <div>`;
        turni.forEach(t => {
            const key = `${targetId}_${S.year}_${S.month}_${d}_${t.id}`;
            const active = S.availability[key];
            html += `<span class="pill ${active?'on':''}" onclick="toggleAvail('${key}', this)">${t.nome}</span>`;
        });
        html += `</div></div>`;
    }
    document.getElementById('disp-container').innerHTML = html;
}

function toggleAvail(key, el) {
    S.availability[key] = !S.availability[key];
    el.classList.toggle('on');
    save();
}

function renderCal() {
    const days = new Date(S.year, S.month + 1, 0).getDate();
    document.getElementById('cal-title').textContent = `${S.month+1} / ${S.year}`;
    let html = "";
    for(let d=1; d<=days; d++) {
        const dow = new Date(S.year, S.month, d).getDay();
        const turni = TURNI_REQS[dow];
        if(!turni) continue;
        html += `<div class="cal-day">
                    <div style="text-align:right; font-weight:bold; padding-top:10px">${d}</div>
                    <div>`;
        turni.forEach(t => {
            const key = `${S.year}_${S.month}_${d}_${t.id}`;
            const assigned = S.assignments[key] || [];
            html += `<div class="turn-box">
                        <div style="font-size:12px; margin-bottom:5px"><strong>${t.nome}</strong> (Target: ${t.req.tot})</div>
                        <div class="chips">`;
            S.employees.forEach(e => {
                const isAvail = S.availability[`${e.id}_${S.year}_${S.month}_${d}_${t.id}`];
                const isAssigned = assigned.includes(e.id);
                html += `<span class="chip ${isAssigned?'assigned':''} ${!isAvail?'unavail':''}" 
                               onclick="toggleAssign('${key}', ${e.id})">${e.name.split(' ')[0]}</span>`;
            });
            html += `</div></div>`;
        });
        html += `</div></div>`;
    }
    document.getElementById('cal-container').innerHTML = html;
}

function toggleAssign(key, empId) {
    if(!S.assignments[key]) S.assignments[key] = [];
    const idx = S.assignments[key].indexOf(empId);
    if(idx > -1) S.assignments[key].splice(idx, 1);
    else S.assignments[key].push(empId);
    save(); renderCal();
}

function changeMonth(dir) {
    S.month += dir;
    if(S.month < 0) { S.month = 11; S.year--; }
    if(S.month > 11) { S.month = 0; S.year++; }
    renderCal();
}

function renderRiepilogo() {
    let tot = 0;
    Object.values(S.assignments).forEach(list => tot += list.length);
    document.getElementById('metrics').innerHTML = `
        <div class="card">Assegnazioni totali: <br><strong>${tot}</strong></div>
        <div class="card">Staff Capitel: <br><strong>${S.employees.length}</strong></div>
    `;
}

load();
</script>
</body>
</html>
